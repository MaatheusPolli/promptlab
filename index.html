<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptLab — Gemini Nano Playground</title>
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <h1>🧩 PromptLab</h1>
                <span class="badge">Offline Gemini Nano</span>
            </div>
            <nav class="main-nav">
                <button id="nav-single" class="active" title="Editor principal">
                    <span>⚡</span> Single Run
                </button>
                <button id="nav-ab" title="Comparar prompts">
                    <span>⚖️</span> A/B Testing
                </button>
                <button id="nav-library" title="Sua biblioteca">
                    <span>📚</span> Library
                </button>
            </nav>
        </header>

        <main id="main-content">
            <div id="view-container">
                <div class="setup-notice" id="setup-notice">
                    <div class="loader-dots"><span></span><span></span><span></span></div>
                    <h2>Detectando Chrome AI...</h2>
                    <p>Aguarde enquanto verificamos se as APIs nativas estão prontas.</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-info">
                <span>&copy; 2026 PromptLab — Criado por <strong>Matheus Gasparotto Polli</strong></span>
            </div>
            <div class="footer-links">
                <button id="export-library" class="btn-export" title="Fazer backup completo">
                    <span>📂</span> Exportar Biblioteca (JSON)
                </button>
            </div>
        </footer>
    </div>

    <!-- UI Templates -->
    <template id="tpl-editor">
        <div class="split-pane">
            <div class="editor-pane">
                <div class="pane-header">
                    <h3>Editor de Prompt</h3>
                    <div class="prompt-actions">
                        <button id="clear-editor" class="btn-small" title="Limpar todos os campos">🗑️ Limpar</button>
                        <button id="save-prompt" class="btn-small" title="Salvar na biblioteca">💾 Salvar na Lib</button>
                    </div>
                </div>
                
                <div class="pane-content">
                    <div class="form-group">
                        <label for="system-prompt">System Prompt</label>
                        <span class="field-help">Define a <strong>persona</strong> e as regras de comportamento.</span>
                        <textarea id="system-prompt" placeholder="Ex: Você é um assistente especializado em tradução formal."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="user-prompt">User Prompt</label>
                        <span class="field-help">O <strong>comando principal</strong>. Use {{variavel}} para templates.</span>
                        <textarea id="user-prompt" placeholder="Ex: Traduza o seguinte texto para {{idioma}}: '{{texto}}'"></textarea>
                    </div>

                    <div id="variables-container" class="variables-container hidden">
                        <label>Variáveis</label>
                        <div id="variables-fields" class="variables-fields"></div>
                    </div>

                    <div class="parameters-grid">
                        <div class="param-item">
                            <div class="param-label">
                                <label>Temperature</label>
                                <span id="val-temp" class="val-display">0.7</span>
                            </div>
                            <input type="range" id="param-temp" min="0" max="1" step="0.1" value="0.7">
                        </div>
                        <div class="param-item">
                            <div class="param-label">
                                <label>Top K</label>
                                <span id="val-topk" class="val-display">10</span>
                            </div>
                            <input type="range" id="param-topk" min="1" max="40" step="1" value="10">
                        </div>
                    </div>

                    <div id="batch-container" class="batch-container hidden">
                        <div class="batch-header">
                            <div class="batch-title"><strong>📦 Execução em Lote</strong></div>
                            <button id="btn-close-batch" class="btn-close">&times;</button>
                        </div>
                        <div class="batch-body" style="padding: 1rem;">
                            <label>Dados (Uma tarefa por linha)</label>
                            <textarea id="batch-input" placeholder="Exemplo para 1 variável:
valor1
valor2

Exemplo para 2 variáveis (use vírgula):
joão, 25
maria, 30"></textarea>
                            <div class="batch-footer">
                                <button id="btn-batch-run" class="btn-primary" style="margin-top: 1rem; width: 100%;">🚀 Iniciar Processamento em Lote</button>
                                <div id="batch-progress" class="batch-progress hidden" style="margin-top: 0.75rem; font-size: 0.8rem; text-align: center; color: var(--accent-color); font-weight: bold;">
                                    Progresso: <span id="batch-current">0</span>/<span id="batch-total">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pane-footer">
                    <div class="run-controls">
                        <button id="btn-run" class="btn-primary" title="Executar o prompt atual (Atalho: Ctrl+Enter)">▶ EXECUTAR</button>
                        <button id="btn-consistency" class="btn-secondary" title="Executa o mesmo prompt 3 vezes para medir a variação. Útil para testar se a resposta é confiável e repetível.">⚖️ Estabilidade (x3)</button>
                        <button id="btn-batch" class="btn-secondary" title="Automação: processe uma lista de dados de uma vez. Substitui as variáveis {{ }} do seu prompt por cada linha da lista abaixo.">📦 Batch</button>
                    </div>
                </div>
            </div>

            <div class="output-pane">
                <div class="pane-header">
                    <h3>Resposta do Gemini</h3>
                    <div id="loading-indicator" class="hidden">
                        <div class="loader-dots"><span></span><span></span><span></span></div>
                    </div>
                </div>
                
                <div id="response-output" class="response-area">
                    <div class="empty-state" style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); flex-direction: column; gap: 1rem;">
                        <span class="empty-state-icon">✨</span>
                        <p>Aguardando execução...</p>
                    </div>
                </div>

                <div class="metrics-bar" id="metrics-bar">
                    <div class="metric">
                        <span class="metric-label">Latência</span>
                        <span class="metric-value" id="m-time">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Tokens</span>
                        <span class="metric-value highlight" id="m-tokens">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Estabilidade</span>
                        <span class="metric-value" id="m-consistency">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Auto-Avaliação</span>
                        <span class="metric-value" id="m-eval">-</span>
                    </div>
                </div>

                <div class="pane-footer" style="display: flex; justify-content: space-between; align-items: center;">
                    <button id="btn-self-eval" class="btn-small" disabled title="A IA analisa a própria resposta com base em critérios de clareza e precisão.">Auto-Avaliar</button>
                    <div class="output-actions">
                        <button id="copy-response" class="btn-small" title="Copiar para área de transferência">📋 Copiar Resposta</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-ab-test">
        <div class="ab-container">
            <div class="ab-editors">
                <div class="ab-side side-a">
                    <h4>Versão A</h4>
                    <textarea id="prompt-a" placeholder="Defina o prompt para a versão A..."></textarea>
                    <div class="ab-params">
                        <div class="param-label">
                            <label>Temp: <span id="val-temp-a" class="val-display">0.7</span></label>
                        </div>
                        <input type="range" id="temp-a" min="0" max="1" step="0.1" value="0.7">
                    </div>
                </div>
                <div class="ab-side side-b">
                    <h4>Versão B</h4>
                    <textarea id="prompt-b" placeholder="Defina o prompt para a versão B..."></textarea>
                    <div class="ab-params">
                        <div class="param-label">
                            <label>Temp: <span id="val-temp-b" class="val-display">0.7</span></label>
                        </div>
                        <input type="range" id="temp-b" min="0" max="1" step="0.1" value="0.7">
                    </div>
                </div>
            </div>
            <div class="ab-actions">
                <button id="btn-run-ab" class="btn-primary" style="width: 300px;">🚀 COMPARAR VERSÕES</button>
            </div>
            <div id="ab-loading" class="hidden" style="text-align: center; padding: 1rem;">
                <div class="loader-dots"><span></span><span></span><span></span></div>
                <p style="font-size: 0.7rem; color: var(--accent-color); margin-top: 0.5rem;">Processando comparações...</p>
            </div>
            <div class="ab-results">
                <div class="res-side" id="res-a" title="Resultado da Versão A"></div>
                <div class="res-side" id="res-b" title="Resultado da Versão B"></div>
            </div>
            <div id="diff-view" class="hidden" style="margin-top: 1rem; background: var(--panel-bg); padding: 1.25rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <h4 style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; letter-spacing: 0.05em;">Visualização de Diferenças (Diff)</h4>
                <div id="diff-content" style="font-size: 0.85rem; line-height: 1.8; font-family: var(--font-mono);"></div>
            </div>
        </div>
    </template>

    <template id="tpl-library">
        <div class="library-container">
            <div class="lib-header">
                <div>
                    <h3 style="font-size: 1.1rem; font-weight: 800;">📚 Sua Biblioteca</h3>
                    <p style="font-size: 0.75rem; color: var(--text-dim);">Prompts salvos localmente</p>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="lib-search" list="tag-suggestions" placeholder="Buscar por título ou tags...">
                    <datalist id="tag-suggestions"></datalist>
                </div>
            </div>
            <div id="lib-list" class="lib-list">
                <!-- Prompts loaded here -->
            </div>
        </div>
    </template>

    <!-- Custom Modal -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title">Confirmação</h3>
            <p id="modal-message">Você tem certeza que deseja realizar esta ação?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="modal-confirm" class="btn-primary">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Prism.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script type="module" src="index.js"></script>
</body>

</html>
